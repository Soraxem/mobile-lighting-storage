services:
  artman:
    build:
      context: artman
      dockerfile: dockerfile
    volumes:
      - ./artman/:/app
    network_mode: host
    restart: always
  
  qlc-plus:
    image: averyout48/qlc-plus-docker
    depends_on:
      - artman
    volumes:
      - ./qlc-configs/active.qxw:/QLC/qlc.qxw
    ports:
      - "80:9999"